workflows:
  android-release:
    name: Android Release (AAB)
    max_build_duration: 60

    environment:
      android_signing:
        - wordle_keystore
      groups:
        - wordle_env
      vars:
        PACKAGE_NAME: "com.wordle.app"
      java: 17

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Run unit tests
        script: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -150

      - name: Build release AAB
        script: |
          ./gradlew :app:checkReleaseDuplicateClasses --info 2>&1 | grep -E "Duplicate|duplicate|class |FAILED|error" | head -40
          echo "---"
          ./gradlew :app:bundleRelease 2>&1 | grep -v "releaseRuntimeClasspath" | grep -v "debugRuntimeClasspath" | head -60
          find . -name "*.aab" 2>/dev/null

    artifacts:
      - "**/*.aab"
      - "**/mapping.txt"

    publishing:
      email:
        recipients:
          - prempradip@gmail.com
        notify:
          success: true
          failure: true
