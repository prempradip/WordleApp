workflows:
  android-release:
    name: Android Release (AAB)
    max_build_duration: 60
    instance_type: linux_x4

    environment:
      android_signing:
        - wordle_keystore
      groups:
        - wordle_env
      vars:
        PACKAGE_NAME: "com.wordle.app"
      java: 17

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Run unit tests
        script: |
          ./gradlew testDebugUnitTest

      - name: Build release AAB
        script: |
          ./gradlew bundleRelease \
            -PKEYSTORE_PATH="$CM_KEYSTORE_PATH" \
            -PKEYSTORE_PASSWORD="$CM_KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$CM_KEY_ALIAS" \
            -PKEY_PASSWORD="$CM_KEY_PASSWORD"

    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - app/build/outputs/mapping/release/mapping.txt
      - app/build/test-results/**/*.xml

    publishing:
      email:
        recipients:
          - prempradip@gmail.com
        notify:
          success: true
          failure: true
