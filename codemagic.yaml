workflows:
  android-release:
    name: Android Release (AAB)
    max_build_duration: 60

    environment:
      android_signing:
        - wordle_keystore
      groups:
        - wordle_env
      vars:
        PACKAGE_NAME: "com.wordle.app"
      java: 17

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Run unit tests
        script: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -150

      - name: Build release AAB
        script: |
          ./gradlew :app:bundleRelease 2>&1 | tee build_output.txt | grep -E "^e:|error:|Caused by:|Exception|FAILED" | head -50
          echo "--- Full tail ---"
          tail -30 build_output.txt
          echo "--- Find AAB ---"
          find . -name "*.aab" 2>/dev/null

    artifacts:
      - "**/*.aab"
      - "**/mapping.txt"

    publishing:
      email:
        recipients:
          - prempradip@gmail.com
        notify:
          success: true
          failure: true
