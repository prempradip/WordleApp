workflows:
  android-release:
    name: Android Release (AAB)
    max_build_duration: 60

    environment:
      android_signing:
        - wordle_keystore
      groups:
        - wordle_env
      vars:
        PACKAGE_NAME: "com.wordle.app"
      java: 17

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Build release AAB
        script: |
          ./gradlew :app:bundleRelease

    artifacts:
      - app/build/outputs/bundle/release/app-release.aab
      - app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - prempradip@gmail.com
        notify:
          success: true
          failure: true
